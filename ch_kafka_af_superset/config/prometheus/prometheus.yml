global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: statsd-exporter
    static_configs:
      - targets:
          - statsd-exporter:9102

  - job_name: clickhouse
    static_configs:
      - targets:
          - clickhouse01:9363
        labels:
          cluster: clickhouse

  # Kafka metrics (kafka-exporter из docker-compose_cluster.yml, та же сеть click_network)
  # - job_name: kafka-exporter
  #   static_configs:
  #     - targets:
  #         - kafka-exporter:9308
